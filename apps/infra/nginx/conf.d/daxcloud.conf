# ── Redirect HTTP → HTTPS ─────────────────────────────
server {
  listen 80;
  server_name daxcloud.shop www.daxcloud.shop;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# ── HTTPS ─────────────────────────────────────────────
server {
  listen 443 ssl http2;
  server_name daxcloud.shop www.daxcloud.shop;

  ssl_certificate     /etc/letsencrypt/live/daxcloud.shop/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/daxcloud.shop/privkey.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         HIGH:!aNULL:!MD5;

  add_header X-Frame-Options        "SAMEORIGIN"    always;
  add_header X-Content-Type-Options "nosniff"       always;
  add_header X-XSS-Protection       "1; mode=block" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  location /api/ {
    limit_req zone=api burst=20 nodelay;
    proxy_pass         http://api:3001/api/;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade    $http_upgrade;
    proxy_set_header   Connection 'upgrade';
    proxy_set_header   Host       $host;
    proxy_set_header   X-Real-IP  $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
    proxy_read_timeout 60s;
  }

  location /notifications/ {
    proxy_pass         http://api:3001/notifications/;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade    $http_upgrade;
    proxy_set_header   Connection "upgrade";
    proxy_set_header   Host       $host;
    proxy_set_header   X-Real-IP  $remote_addr;
    proxy_read_timeout 3600s;
  }

  location / {
    limit_req zone=web burst=40 nodelay;
    proxy_pass         http://web:3005;
    proxy_http_version 1.1;
    proxy_set_header   Upgrade    $http_upgrade;
    proxy_set_header   Connection 'upgrade';
    proxy_set_header   Host       $host;
    proxy_set_header   X-Real-IP  $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_cache_bypass $http_upgrade;
  }
}